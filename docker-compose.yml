services:
  postgres:
    image: postgres:15-alpine
    container_name: cineplex_postgres
    restart: always
    environment:
      POSTGRES_DB: cineplex_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql

  redis:
    image: redis:7-alpine
    container_name: cineplex_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build: ./backend
    container_name: cineplex_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=cineplex_db
      - DB_USER=postgres
      - DB_PASSWORD=yourpassword
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=your_super_secret_key_change_this
      - CLIENT_URL=http://localhost:8080
      - TMDB_API_KEY=YOUR_DEMO_KEY_HERE
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    container_name: cineplex_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data: